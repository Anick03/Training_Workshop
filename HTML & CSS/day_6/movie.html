<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket Booking Form</title>
</head>
<body>
    <h1>Movie Ticket Booking Form</h1>
    <a href="student.html">Student Registration Form</a>
    <br><br>

    <form>

        <label>Select Movie:</label>
        <select name="movie">
            <option>Avengers</option>
            <option>Spider-Man</option>
            <option>Batman</option>
            <option>Superman</option>
        </select>
        <br><br>

        <label>Ticket Type:</label><br><br>

        <input type="radio" id="regular" name="ticket" value="Regular">
        <label for="regular">Regular</label><br>

        <input type="radio" id="vip" name="ticket" value="VIP">
        <label for="vip">VIP</label><br><br>

        <label>Choose Snacks:</label><br><br>

        <input type="checkbox" id="popcorn" name="snack" value="Popcorn">
        <label for="popcorn">Popcorn</label><br>

        <input type="checkbox" id="nachos" name="snack" value="Nachos">
        <label for="nachos">Nachos</label><br>

        <input type="checkbox" id="softdrink" name="snack" value="Soft Drink">
        <label for="softdrink">Soft Drink</label><br>

        <input type="checkbox" id="fries" name="snack" value="French Fries">
        <label for="fries">French Fries</label><br><br>

        <label>Show Time:</label><br><br>

        <input type="radio" id="morning" name="showtime" value="Morning">
        <label for="morning">Morning</label><br>

        <input type="radio" id="afternoon" name="showtime" value="Afternoon">
        <label for="afternoon">Afternoon</label><br>

        <input type="radio" id="evening" name="showtime" value="Evening">
        <label for="evening">Evening</label><br><br>

        <label>Payment Method:</label>
        <select name="payment">
            <option>Cash</option>
            <option>Card</option>
            <option>eSewa</option>
            <option>Khalti</option>
        </select>
        <br><br>

        <input type="submit" value="Book Ticket">

    </form>

</body>
</html>
