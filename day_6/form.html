<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <div>
    <form style="border: 1px solid black; padding: 1rem; width: 50%;">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required><br><br>

        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="Nepal">Nepal</option>
            <option value="India">India</option>
            <option value="China">China</option>
        </select><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

        <label for ="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" placeholder="Select your date of birth" required><br><br>

        <label for="gender" required>Gender:</label>
        <input type="radio" id="male" name="gender" value="male"> Male 
        <input type="radio" id="female" name="gender" value="female">Female<br><br>

        <label for="hobbies">Hobbies:</label>
        <input type="checkbox" id="reading" name="hobbies" value="reading"> Reading
        <input type="checkbox" id="traveling" name="hobbies" value="traveling"> Traveling
        <input type="checkbox" id="sports" name="hobbies" value="sports"> Sports<br><br>
        
        <label for="suggestion">Suggestion:</label>
        <input id="suggestion" name="suggestion" placeholder="Enter your suggestion"></input><br><br>


        <button type="submit">Submit</button>
    </form>
    </div>
</body>
</html>
