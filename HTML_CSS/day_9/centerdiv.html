<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centering a Div</title>
    <style>

        .container{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .a{
            border: 2px solid black;
            height: 20px;
            padding: 5px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="a">Yowaimo!</div>
    </div>
</body>
</html>
