<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <a href="movie.html">Movie Ticket Booking Form</a>
    <br><br>
    <form>

        <label>Full Name:</label>
        <input type="text" name="fullname" placeholder="Enter your full name"><br><br>

        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <label>Phone Number:</label>
        <input type="tel" name="phone" placeholder="Enter your phone number"><br><br>

        <label>Date of Birth:</label>
        <input type="date" name="dob" placeholder="Select your date of birth"><br><br>

        <label>Password:</label>
        <input type="password" name="password" placeholder="Create a password"><br><br>

        <label>Gender:</label><br><br>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br><br>

        <label>Subjects:</label><br><br>

        <input type="checkbox" id="html" name="subject" value="HTML">
        <label for="html">HTML</label><br>

        <input type="checkbox" id="css" name="subject" value="CSS">
        <label for="css">CSS</label><br>

        <input type="checkbox" id="js" name="subject" value="JavaScript">
        <label for="js">JavaScript</label><br><br>

        <label>Semester:</label>
        <select name="semester">
            <option>1st Semester</option>
            <option>2nd Semester</option>
            <option>3rd Semester</option>
            <option>4th Semester</option>
            <option>5th Semester</option>
            <option>6th Semester</option>
            <option>7th Semester</option>
            <option>8th Semester</option>
        </select><br><br>

        <label>Country:</label>
        <select name="country">
            <option>Nepal</option>
            <option>India</option>
            <option>China</option>
            <option>Bangladesh</option>
            <option>Bhutan</option>
        </select><br><br>

        <input type="submit" value="Register">

    </form>
</body>
</html>
